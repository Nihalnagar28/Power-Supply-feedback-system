<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin login for Power Supply Feedback System.">
    <title>Admin Login — Power Supply Feedback System</title>
    <link rel="stylesheet" href="../public/css/app.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <span class="brand-icon">⚡</span>
                Power Supply
            </a>
            <button class="navbar-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
            <ul class="navbar-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="feedback.html">Submit Feedback</a></li>
                <li><a href="complaints.html">Complaints</a></li>
                <li><a href="admin-login.html" class="active">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="login-wrapper">
            <div class="card login-card">
                <h2>Admin Login</h2>
                <p class="login-subtitle">Sign in to manage complaints</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="admin@power.gov" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Sign In</button>

                    <p class="text-muted text-center mt-2" style="font-size:0.8rem;">
                        Demo: admin@power.gov / admin123
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            &copy; 2026 Power Supply Feedback System. All rights reserved.
        </div>
    </footer>

    <script src="../public/js/app.js"></script>
</body>
</html>
